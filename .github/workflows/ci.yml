name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Run test suite (offline, mock mode)
        # The CI runner has no Claude Code CLI (it only checks install STRUCTURE,
        # not a real session), so let install.sh skip ONLY its `claude` probe.
        env:
          CLAUDE_REASONIX_SKIP_CLAUDE_CHECK: "1"
        run: bash tests/run-all.sh
